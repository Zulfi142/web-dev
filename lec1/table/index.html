<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- thead tag se heading banegi tr tag se row banegi and td tag se column banegi th tag se bhi column banegi  
    th tag se data bold hoga aur center align hoga by default and td tag se data normal hoga and left align hoga by default 
    t body tag se pura table ka body banega -->
    <h2>HTML TABLE</h2>
    <table border="2" cellpadding="20" cellspacing="15">
        <thead>
           
            <tr> 
                <th>TIME
                </th>
                <th>9-10</th>
                <th>10-11</th>
                <th>11-12</th>
                <th>12-1</th>
                <th>1-2</th>
            </tr>
        </thead>
        <TBody align="center">
            <tr>
                <td>MONDAY</td>
                <td>C++</td>
                <td>Java</td>
                <td>Python</td>
                <td>JavaScript</td>
                <td> MERN</td>
            </tr>
            <tr>
                <td>TUESDAY</td>
                <td>English</td>
                <td>Hindi</td>
                <td colspan="2">Maths</td>
                <td>Science</td>
                
            </tr>
            <tr>
                <td>WEDNESDAY</td>
                <td>computerscience </td>
                <td>Electronics</td>
                <td rowspan="2">Electrical</td>
                <td>Mechanical</td>
                <td>Civil</td>
            </tr>
            <tr>
                <td>THURSDAY</td>
                <td>html</td>
                <td>css</td>
                <td>js</td>
                <td>react</td>
            </tr>
        </TBody>
    </table>
</body>
</html>
