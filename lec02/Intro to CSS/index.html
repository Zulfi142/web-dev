<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<!-- ye external hai -->
    <link rel="stylesheet" href="style.css">
<!-- ye internal hai -->
    <style>
        h1{
            color: red;
        }
        h2{
            color: blueviolet;
        }

</head>

        hyyyy brrrooohhh

</html>

 aur doosri baat ye tree like structure hai jo pehle likha hoga wo pehle chalega
