<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flip Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">

        <div class="card-inner">

            <!-- Front -->

            <div class="front">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800" alt="Nature">
            </div>

            <!-- Back -->

            <div class="back">

                <h2>Nature</h2>

                <p>
                    Nature is the world's greatest artist.
                    Every mountain, forest and river tells
                    a beautiful story waiting to be explored.
                </p>

                <button>Explore</button>

            </div>

        </div>

    </div>

</body>
</html>
